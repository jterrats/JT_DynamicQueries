name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Only trigger on actual documentation changes
      - "docs/**/*.html"
      - "docs/**/*.md"
      - "docs/**/*.yml"
      - "docs/**/*.yaml"
      - "docs/**/*.js"
      - "docs/**/*.css"
      - "docs/**/*.json"
      - "docs/_config.yml"
      - ".github/workflows/gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create Gemfile
        working-directory: docs
        run: |
          cat > Gemfile << 'EOF'
          source "https://rubygems.org"

          gem "jekyll", "~> 4.3"
          gem "webrick", "~> 1.8"
          EOF

      - name: Install dependencies
        working-directory: docs
        run: bundle install

      - name: Build with Jekyll
        working-directory: docs
        run: bundle exec jekyll build --baseurl "/JT_DynamicQueries"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify main site
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PROJECT_SLUG: JT_DynamicQueries
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN is not configured; skipping main site dispatch."
            exit 0
          fi

          if gh api repos/jterrats/jterrats_dev/dispatches \
            -f event_type=project-site-updated \
            -F client_payload[project]="${PROJECT_SLUG}" \
            -F client_payload[source_repo]="${{ github.repository }}" \
            -F client_payload[source_sha]="${{ github.sha }}"; then
            echo "Main site dispatch sent."
          else
            echo "::warning::Main site dispatch failed. Check GH_TOKEN permissions for jterrats_dev."
          fi
